<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="sidebar.css" />
    <title>AI Sidebar</title>
  </head>
  <body>
    <!-- Top bar: brand + global actions -->
    <header class="topbar">
      <div class="brand">
        <img src="../../icons/icon.svg" alt="" class="brand-logo" />
        <span class="brand-name">AI Sidebar</span>
      </div>
      <div class="row">
        <button id="historyBtn" class="icon" title="Historique (local)">🕘</button>
        <button id="newChat" class="icon" title="Nouvelle conversation">＋</button>
        <button id="openOptions" class="icon" title="Réglages">⚙</button>
      </div>
    </header>

    <!-- Unified model picker (above the chat zone) -->
    <div class="modelbar">
      <div class="select-wrap">
        <select id="modelSelect" title="Modèle"></select>
      </div>
      <button id="refreshModels" class="icon" title="Rafraîchir la liste des modèles">⟳</button>
      <label class="switch mini" title="Comparer avec un second modèle">
        <input type="checkbox" id="compareMode" />
        <span class="track"></span>
        <span class="lbl">⚖ Comparer</span>
      </label>
    </div>
    <div class="modelbar compare-row hidden" id="compareRow">
      <span class="vs">vs</span>
      <div class="select-wrap">
        <select id="compareSelect" title="Second modèle"></select>
      </div>
    </div>

    <!-- Workspace tabs -->
    <nav class="modebar" id="modebar">
      <button class="mode active" data-mode="chat">💬 Chat</button>
      <button class="mode" data-mode="translate">🌐 Traduire</button>
      <button class="mode" data-mode="improve">✨ Améliorer</button>
      <button class="mode" data-mode="image">🎨 Image</button>
    </nav>

    <!-- History panel -->
    <div id="historyPanel" class="panel hidden">
      <div class="panel-head">
        <span>🕘 Historique <span class="muted">(local, privé)</span></span>
        <button id="clearHistory" class="link-btn" title="Tout effacer">Tout effacer</button>
      </div>
      <ul id="historyList" class="historylist"></ul>
    </div>

    <!-- Page chip + multi-tab picker -->
    <div id="pageBar" class="pagebar hidden" title="Page vue par l'IA">
      <span class="eye">👁</span>
      <span id="pageTitle" class="page-title"></span>
      <button id="tabsBtn" class="icon" title="Choisir les onglets à donner à l'IA">📑</button>
    </div>
    <div id="tabsPanel" class="panel hidden">
      <div class="panel-head">
        <label class="check"><input type="checkbox" id="useTabs" /> Utiliser les onglets cochés</label>
        <button id="tabsRefresh" class="icon" title="Rafraîchir">⟳</button>
      </div>
      <ul id="tabsList" class="tabslist"></ul>
    </div>

    <main id="messages" class="messages">
      <div class="empty" id="empty">
        <div class="empty-logo"><img src="../../icons/icon.svg" alt="" /></div>
        <p class="empty-title">Sidebar IA — branchez votre IA</p>
        <p class="muted">
          Claude, OpenAI, Gemini, Mistral, Groq, DeepSeek, OpenRouter, ou un modèle
          <b>local</b> (Ollama / LM Studio).
        </p>
        <div class="empty-actions">
          <button id="connectOpenRouter" class="btn-grad">Se connecter avec OpenRouter</button>
          <button id="emptyOptions" class="btn-ghost">⚙ Ajouter une clé API</button>
        </div>
      </div>
    </main>

    <div id="confirmBar" class="confirm hidden">
      <span id="confirmText"></span>
      <div class="confirm-actions">
        <button id="confirmAllow" class="ok">Autoriser</button>
        <button id="confirmDeny" class="no">Refuser</button>
      </div>
    </div>

    <!-- Adaptive control row (changes with the active mode) -->
    <div class="controls" id="controls">
      <!-- chat: toggle switches -->
      <div class="ctl-group" id="chatControls">
        <label class="switch" title="Afficher le raisonnement du modèle">
          <input type="checkbox" id="thinking" /><span class="track"></span><span class="lbl">💭 Réflexion</span>
        </label>
        <label class="switch" title="Recherche web (Claude)">
          <input type="checkbox" id="webSearch" /><span class="track"></span><span class="lbl">🌐 Web</span>
        </label>
        <label class="switch" title="Le modèle peut agir dans le navigateur (sans achat)">
          <input type="checkbox" id="agentMode" /><span class="track"></span><span class="lbl">🤖 Agent</span>
        </label>
        <label class="switch" title="L'IA voit la page consultée">
          <input type="checkbox" id="pageCtx" /><span class="track"></span><span class="lbl">👁 Page</span>
        </label>
      </div>

      <!-- translate -->
      <div class="ctl-group hidden" id="translateControls">
        <label>Traduire vers
          <select id="translateLang">
            <option>Français</option><option>Anglais</option><option>Espagnol</option>
            <option>Allemand</option><option>Italien</option><option>Portugais</option>
            <option>Néerlandais</option><option>Arabe</option><option>Chinois</option>
            <option>Japonais</option><option>Russe</option>
          </select>
        </label>
        <span class="muted">vide = la page</span>
      </div>

      <!-- improve -->
      <div class="ctl-group hidden" id="improveControls">
        <label>Style d'écriture
          <select id="improvePreset"></select>
        </label>
      </div>

      <!-- image -->
      <div class="ctl-group hidden" id="imageControls">
        <label>Taille
          <select id="imageSize">
            <option>1024x1024</option><option>1024x1792</option>
            <option>1792x1024</option><option>512x512</option>
          </select>
        </label>
        <span class="muted" id="imageProviderNote"></span>
      </div>
    </div>

    <footer class="composer">
      <textarea id="input" rows="1" placeholder="Écrivez un message…"></textarea>
      <button id="send" class="btn-grad send" title="Envoyer">➤</button>
      <button id="stop" class="hidden send" title="Stop">■</button>
    </footer>

    <script src="../../vendor/marked.min.js"></script>
    <script src="../../vendor/purify.min.js"></script>
    <script type="module" src="sidebar.js"></script>
  </body>
</html>
