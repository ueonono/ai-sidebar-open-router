<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Réutilise le VRAI CSS de la sidebar -->
    <link rel="stylesheet" href="../src/sidebar/sidebar.css" />
    <title>AI Sidebar — démo de rendu</title>
    <style>
      html, body { height: 100%; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="row">
        <select>
          <option>Claude (Anthropic)</option>
          <option>OpenAI</option>
          <option>Ollama (local)</option>
        </select>
        <select><option>Claude Opus 4.8</option></select>
        <button class="icon">⟳</button>
      </div>
      <div class="row">
        <label class="toggle"><input type="checkbox" checked /> <span>💭</span></label>
        <label class="toggle"><input type="checkbox" /> <span>🌐</span></label>
        <label class="toggle"><input type="checkbox" /> <span>Agent</span></label>
        <label class="toggle"><input type="checkbox" checked /> <span>👁</span></label>
        <button class="icon">＋</button><button class="icon">⚙</button>
      </div>
    </header>

    <nav class="modebar">
      <button class="mode active">💬 Chat</button>
      <button class="mode">🌐 Traduire</button>
      <button class="mode">✨ Améliorer</button>
      <button class="mode">🎨 Image</button>
    </nav>

    <div class="pagebar">
      <span class="eye">👁</span>
      <span class="page-title">OAuth 2.0 — RFC 6749 (datatracker.ietf.org)</span>
      <button class="icon">📑</button>
    </div>

    <main id="messages" class="messages"></main>

    <div class="quickbar">
      <button class="quick">📝 Résumer</button>
      <button class="quick">🌐 Traduire</button>
      <button class="quick">✨ Améliorer</button>
      <button class="quick">🔍 Rechercher</button>
      <button class="quick">🎨 Image</button>
    </div>

    <footer class="composer">
      <textarea rows="2" placeholder="Écrivez un message…">Explique-moi le flux OAuth 2.0 avec un schéma</textarea>
      <button id="send">➤</button>
    </footer>

    <!-- VRAIES libs vendorées -->
    <script src="../vendor/marked.min.js"></script>
    <script src="../vendor/purify.min.js"></script>
    <script type="module">
      window.browser = {
        runtime: { getURL: (p) => new URL("../" + p, location.href).href },
      };
      import {
        configureMarkdown,
        renderMarkdown,
        enhanceArtifacts,
      } from "../src/lib/markdown.js";

      const messages = document.getElementById("messages");
      function addMsg(role, html) {
        const d = document.createElement("div");
        d.className = "msg " + role;
        if (role === "user") d.textContent = html;
        else d.innerHTML = html;
        messages.appendChild(d);
        return d;
      }
      function addThink(text) {
        const d = document.createElement("details");
        d.className = "think"; d.open = true;
        d.innerHTML = '<summary>💭 Réflexion</summary><div class="think-body"></div>';
        d.querySelector(".think-body").textContent = text;
        messages.appendChild(d);
      }

      const sample = [
        "Voici le **flux OAuth 2.0** (Authorization Code) en bref :",
        "",
        "1. L'app redirige l'utilisateur vers le serveur d'autorisation",
        "2. L'utilisateur s'authentifie et **consent**",
        "3. Le serveur renvoie un `code`",
        "4. L'app échange le `code` contre un *access token*",
        "",
        "```mermaid",
        "sequenceDiagram",
        "  participant U as Utilisateur",
        "  participant A as App",
        "  participant S as Serveur OAuth",
        "  U->>A: Clic « Se connecter »",
        "  A->>S: Redirection /authorize",
        "  S-->>U: Page de consentement",
        "  U->>S: Consent",
        "  S-->>A: code",
        "  A->>S: POST /token (code)",
        "  S-->>A: access_token",
        "```",
        "",
        "Et un bouton de connexion :",
        "",
        "```html",
        '<button style="padding:10px 18px;border:0;border-radius:8px;background:#c8643c;color:#fff;font:600 14px system-ui;cursor:pointer">Se connecter avec OAuth</button>',
        "```",
      ].join("\n");

      configureMarkdown();
      addMsg("user", "Explique-moi le flux OAuth 2.0 avec un schéma");
      addThink("La page ouverte est la RFC 6749. L'utilisateur veut le flux Authorization Code. Je vais l'expliquer pas à pas, puis fournir un diagramme de séquence mermaid et un bouton d'exemple.");
      const a = addMsg("assistant", renderMarkdown(sample));
      enhanceArtifacts(a);

      setTimeout(() => {
        for (const b of a.querySelectorAll(".code-btn")) {
          if (b.textContent === "Aperçu") b.click();
        }
        document.body.dataset.ready = "1";
      }, 1200);
    </script>
  </body>
</html>
